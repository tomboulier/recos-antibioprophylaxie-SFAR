services:
  # PROD — branche main
  - type: web
    name: recos-antibioprophylaxie-sfar
    branch: main
    runtime: python
    region: frankfurt
    plan: free
    buildCommand: pip install "uv==0.4.20" && uv sync --frozen
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DEBUG
        value: false

  # STAGING — branche dev
  - type: web
    name: recos-antibioprophylaxie-sfar-dev
    branch: dev
    runtime: python
    region: frankfurt
    plan: free
    buildCommand: pip install "uv==0.4.20" && uv sync --frozen
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DEBUG
        value: true
