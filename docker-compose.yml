services:
  app:
    image: ghcr.io/tomboulier/recos-antibioprophylaxie-sfar:latest
    container_name: sfar-antibio
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
